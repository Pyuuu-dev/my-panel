scraper:
  base_url: "https://otakudesu.blog"
  interval_minutes: 30
  delay: 2
  max_pages: 3
  detail_limit: 20
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"

watchlist:
  - "one piece"
  - "jujutsu kaisen"

discord:
  webhook_url: ""
  notify_on_watchlist: true
  notify_on_scrape_done: true

cleanup:
  keep_days: 7
