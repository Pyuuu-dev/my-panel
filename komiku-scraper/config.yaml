scraper:
  api_url: "https://api.komiku.org/manga/page/"
  base_url: "https://komiku.org"
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"

  # Full scan settings
  full_scan_delay: 0.5
  full_scan_batch_size: 50

  # Update tracker settings
  update_pages: 5
  update_delay: 1.0
  interval_minutes: 30

  # General
  max_retries: 3
  timeout: 30

webhook:
  enabled: true
  discord_url: ""
  notify_mode: "bookmark"  # "all" = semua update, "bookmark" = bookmark saja

watchlist: []

logging:
  level: INFO

output:
  directory: /opt/services/komiku-scraper/output
