<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Sign In · Service Manager</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
<style>
:root{
  --bg-base:#0a0f1a;--bg-surface:#0f1623;--bg-elevated:#182032;
  --border-default:rgba(148,163,184,0.14);--border-subtle:rgba(148,163,184,0.08);
  --text-primary:#f1f5f9;--text-secondary:#94a3b8;--text-muted:#64748b;
  --accent:#06b6d4;--accent-glow:0 0 32px rgba(6,182,212,0.25);
}
*{box-sizing:border-box}
body{
  margin:0;min-height:100vh;
  background:var(--bg-base);
  color:var(--text-primary);
  font-family:'Geist',ui-sans-serif,system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
  display:flex;align-items:center;justify-content:center;
  padding:24px;
  background-image:
    radial-gradient(circle at 20% 30%, rgba(6,182,212,0.08) 0%, transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(99,102,241,0.06) 0%, transparent 40%);
}
.bg-grid{
  position:fixed;inset:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(148,163,184,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(148,163,184,0.04) 1px, transparent 1px);
  background-size:48px 48px;
  mask-image:radial-gradient(ellipse at center, black 30%, transparent 70%);
}
.card{
  position:relative;
  width:100%;max-width:400px;
  background:var(--bg-surface);
  border:1px solid var(--border-default);
  border-radius:18px;
  padding:32px 28px;
  box-shadow:0 20px 80px rgba(0,0,0,0.4),var(--accent-glow);
}
.logo{
  width:52px;height:52px;
  background:linear-gradient(135deg, var(--accent) 0%, #6366f1 100%);
  border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-weight:700;color:#0a0f1a;font-size:18px;
  box-shadow:var(--accent-glow);
  margin:0 auto 16px;
}
h1{font-size:22px;font-weight:600;text-align:center;margin:0 0 6px;letter-spacing:-0.02em}
.subtitle{font-size:12px;text-align:center;color:var(--text-muted);font-family:'Geist Mono',monospace;letter-spacing:0.05em}
.field{margin-top:18px}
.field label{
  display:block;font-size:11px;font-weight:500;
  color:var(--text-secondary);
  margin-bottom:6px;
  text-transform:uppercase;letter-spacing:0.05em;
}
.input{
  width:100%;
  padding:11px 14px;
  background:var(--bg-base);
  border:1px solid var(--border-default);
  border-radius:10px;
  color:var(--text-primary);
  font-size:14px;
  font-family:inherit;
  transition:all 150ms;
}
.input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(6,182,212,0.15)}
.btn{
  margin-top:24px;width:100%;
  padding:11px;
  background:var(--accent);
  color:#0a0f1a;font-weight:600;font-size:14px;
  border:none;border-radius:10px;
  cursor:pointer;
  transition:all 150ms;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn:hover{background:#22d3ee;box-shadow:var(--accent-glow);transform:translateY(-1px)}
.alert{
  padding:11px 14px;
  background:rgba(239,68,68,0.1);
  border:1px solid rgba(239,68,68,0.3);
  border-radius:10px;
  color:#f87171;
  font-size:13px;
  margin-bottom:18px;
  display:flex;align-items:center;gap:8px;
}
.footer{
  text-align:center;
  margin-top:20px;
  font-size:11px;
  color:var(--text-muted);
  font-family:'Geist Mono',monospace;
}
</style>
</head>
<body>
<div class="bg-grid"></div>

<div class="card">
  <div class="logo">SM</div>
  <h1>Service Manager</h1>
  <p class="subtitle">VPS CONTROL PANEL · v5.0</p>

  <form method="POST" action="/login" style="margin-top:24px">
    {% if error %}
    <div class="alert">
      <i data-lucide="alert-circle" style="width:16px;height:16px;flex-shrink:0"></i>
      <span>{{ error }}</span>
    </div>
    {% endif %}

    <div class="field">
      <label>Username</label>
      <input type="text" name="username" required autofocus class="input" autocomplete="username">
    </div>

    <div class="field">
      <label>Password</label>
      <input type="password" name="password" required class="input" autocomplete="current-password">
    </div>

    <button type="submit" class="btn">
      <span>Sign In</span>
      <i data-lucide="arrow-right" style="width:16px;height:16px"></i>
    </button>
  </form>

  <p class="footer">Authorized access only</p>
</div>

<script>document.addEventListener('DOMContentLoaded',()=>lucide.createIcons())</script>
</body>
</html>
