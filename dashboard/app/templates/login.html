<!DOCTYPE html>
<html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Login - Service Manager</title><script src="https://cdn.tailwindcss.com"></script></head>
<body class="min-h-screen bg-gray-950 flex items-center justify-center px-4">
<div class="w-full max-w-sm">
<div class="text-center mb-6">
<div class="w-14 h-14 bg-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-3 text-white font-bold text-lg">SM</div>
<h1 class="text-xl font-bold text-white">Service Manager</h1>
<p class="text-gray-500 text-xs mt-1">Komik Scraper Control Panel</p>
</div>
<div class="bg-gray-900 border border-gray-800 rounded-xl p-6">
{% if error %}<div class="mb-4 p-3 bg-red-500/10 border border-red-500/30 rounded-lg text-red-400 text-sm">{{ error }}</div>{% endif %}
<form method="POST" action="/login" class="space-y-4">
<div><label class="block text-sm text-gray-400 mb-1">Username</label>
<input type="text" name="username" required autofocus class="w-full px-3 py-2 bg-gray-800 border border-gray-700 rounded-lg text-white text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"></div>
<div><label class="block text-sm text-gray-400 mb-1">Password</label>
<input type="password" name="password" required class="w-full px-3 py-2 bg-gray-800 border border-gray-700 rounded-lg text-white text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"></div>
<button type="submit" class="w-full py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg text-sm font-medium">Sign In</button>
</form>
</div>
</div>
</body></html>
